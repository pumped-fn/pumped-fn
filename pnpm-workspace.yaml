  "@types/jscodeshift": 17.3.0
  "@types/node": 25.9.1
  "@types/react": 19.2.15
  "@types/react-dom": 19.2.3
  "@typescript/native-preview": 7.0.0-dev.20260526.1
  "@vitest/coverage-v8": 4.1.7
  acorn: 8.16.0

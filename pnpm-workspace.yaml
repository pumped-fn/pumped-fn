packages:
  - pkg/*/*
  - examples/*
  - benchmarks/*

catalogMode: strict
cleanupUnusedCatalogs: true
minimumReleaseAge: 1440
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 10080
trustPolicyExclude:
  - ast-v8-to-istanbul@1.0.2
  - tinyexec@1.2.2
blockExoticSubdeps: true
resolutionMode: time-based
strictDepBuilds: true
verifyStoreIntegrity: true
strictStorePkgContentCheck: true
preferFrozenLockfile: true
packageManagerStrict: true
savePrefix: ""

overrides:
  esbuild: 0.28.1
  "@babel/runtime": 7.29.7
  "@babel/helpers": 7.29.7
  js-yaml: 4.2.0
  read-yaml-file: 2.1.0
  rolldown: 1.0.2
  brace-expansion@>=2 <3: 2.0.3
  dompurify: 3.4.6
  lodash-es: 4.18.1
  picomatch@>=2 <3: 2.3.2
  picomatch@>=4: 4.0.4
  protobufjs@>=7 <8: 7.5.5
  yaml@>=2 <3: 2.9.0
  undici: 7.28.0
  ws: 8.21.0
  tmp: 0.2.7
  "@vitest/browser": 4.1.8

allowBuilds:
  "@mongodb-js/zstd": false
  esbuild: true
  node-liblzma: false
  sharp: true
  protobufjs: false
  puppeteer: false

packageExtensions:
  bun-ffi-structs@*:
    peerDependencies:
      typescript: ^5.0.0 || ^6.0.0

peerDependencyRules:
  allowedVersions:
    typescript: ^5.0.0 || ^6.0.0


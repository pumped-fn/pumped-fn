name: Deploy Pages

on:
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify Pages artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm -F @pumped-fn/compare exec playwright install --with-deps chromium

      - name: Stage and verify Pages artifact
        run: pnpm pages:dry-run

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: playground/compare/dist-pages/site

  deploy:
    name: Deploy Pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-public:
    name: Verify public Pages
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PAGES_PUBLIC_BASE_URL: ${{ needs.deploy.outputs.page_url }}
      PAGES_EXPECTED_REVISION: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm -F @pumped-fn/compare exec playwright install --with-deps chromium

      - name: Verify deployed Pages
        run: pnpm pages:verify:public

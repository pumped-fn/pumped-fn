name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Configure npm for OIDC trusted publishing
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true
          echo "npm version: $(npm --version)"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm -F @pumped-fn/lite-react exec playwright install --with-deps chromium

      - name: Install Lightpanda browser
        run: |
          curl -fsSL -o /tmp/lightpanda https://github.com/lightpanda-io/browser/releases/download/nightly/lightpanda-x86_64-linux
          chmod +x /tmp/lightpanda
          echo "LIGHTPANDA_EXECUTABLE_PATH=/tmp/lightpanda" >> "$GITHUB_ENV"

      - name: Check Lightpanda browser
        run: ${LIGHTPANDA_EXECUTABLE_PATH:-$HOME/.cache/lightpanda-node/lightpanda} version

      - name: Build packages
        run: pnpm -r build

      - name: Run tests
        timeout-minutes: 15
        run: pnpm -r --workspace-concurrency=2 test --passWithNoTests

      - name: Diagnose test failure
        if: failure()
        run: |
          nproc
          lscpu
          free -h
          ps -eo pid,ppid,stat,etime,%cpu,%mem,wchan:32,comm --sort=-%cpu

      - name: Run comparison browser smoke
        run: pnpm -F @pumped-fn/compare browser:smoke

      - name: Run Lightpanda browser tests
        run: pnpm -F @pumped-fn/lite-react test:browser:lightpanda

      - name: Generate release title
        id: release_title
        run: echo "title=$(bash scripts/get-release-title.sh)" >> $GITHUB_OUTPUT

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1.9.0
        with:
          publish: pnpm changeset:publish
          version: pnpm changeset version
          commit: 'chore: version packages'
          title: '${{ steps.release_title.outputs.title }}'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Publish notification
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "🎉 Published packages:"
          echo "${{ steps.changesets.outputs.publishedPackages }}"

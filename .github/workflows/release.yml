name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Configure npm for OIDC trusted publishing
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true
          echo "npm version: $(npm --version)"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm -F @pumped-fn/lite-react exec playwright install --with-deps chromium

      - name: Install Lightpanda browser
        run: |
          lightpanda_sha256=5713d49d06e8d4948d3358b6ce859ecca8e6f07dc312134d9f54999fb6e66c52
          curl -fsSL -o /tmp/lightpanda https://github.com/lightpanda-io/browser/releases/download/0.3.5/lightpanda-x86_64-linux
          echo "${lightpanda_sha256}  /tmp/lightpanda" | sha256sum --check --status
          chmod +x /tmp/lightpanda
          echo "LIGHTPANDA_EXECUTABLE_PATH=/tmp/lightpanda" >> "$GITHUB_ENV"

      - name: Check Lightpanda browser
        run: ${LIGHTPANDA_EXECUTABLE_PATH:-$HOME/.cache/lightpanda-node/lightpanda} version

      - name: Build packages
        run: pnpm -r build

      - name: Run tests
        timeout-minutes: 15
        run: pnpm -r --workspace-concurrency=2 test --passWithNoTests

      - name: Diagnose test failure
        if: failure()
        run: |
          nproc
          lscpu
          free -h
          ps -eo pid,ppid,stat,etime,%cpu,%mem,wchan:32,comm --sort=-%cpu

      - name: Run comparison browser smoke
        run: pnpm -F @pumped-fn/compare browser:smoke

      - name: Run Lightpanda browser tests
        run: pnpm -F @pumped-fn/lite-react test:browser:lightpanda

      - name: Generate release title
        id: release_title
        run: echo "title=$(bash scripts/get-release-title.sh)" >> $GITHUB_OUTPUT

      - name: Detect release work
        id: release_state
        shell: bash
        run: |
          if find .changeset -maxdepth 1 -type f -name '*.md' ! -name README.md -print -quit | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

          subject=$(git log -1 --format=%s)
          if [[ "$subject" =~ ^chore:\ version\ packages(\ \(#[0-9]+\))?$ ]]; then
            echo "is_version_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_version_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release Pull Request or Publish
        if: "${{ steps.release_state.outputs.has_changesets == 'true' || steps.release_state.outputs.is_version_commit == 'true' }}"
        id: changesets
        uses: changesets/action@v1.9.0
        with:
          publish: pnpm changeset:publish
          version: pnpm changeset version
          commit: 'chore: version packages'
          title: '${{ steps.release_title.outputs.title }}'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Publish notification
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "🎉 Published packages:"
          echo "${{ steps.changesets.outputs.publishedPackages }}"

      - name: Verify published registry metadata
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process'

          const packages = JSON.parse(process.env.PUBLISHED_PACKAGES)
          for (const { name, version } of packages) {
            const actual = JSON.parse(execFileSync('npm', ['view', `${name}@${version}`, 'version', '--json'], { encoding: 'utf8' }))
            if (actual !== version) throw new Error(`${name}@${version} is not visible in the npm registry`)
          }
          NODE

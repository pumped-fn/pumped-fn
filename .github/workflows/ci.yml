name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm -F @pumped-fn/lite-react exec playwright install --with-deps chromium

      - name: Install Lightpanda browser
        run: |
          curl -fsSL -o /tmp/lightpanda https://github.com/lightpanda-io/browser/releases/download/nightly/lightpanda-x86_64-linux
          chmod +x /tmp/lightpanda
          echo "LIGHTPANDA_EXECUTABLE_PATH=/tmp/lightpanda" >> "$GITHUB_ENV"

      - name: Check Lightpanda browser
        run: ${LIGHTPANDA_EXECUTABLE_PATH:-$HOME/.cache/lightpanda-node/lightpanda} version

      - name: Build packages
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test --passWithNoTests

      - name: Run Lightpanda browser tests
        run: pnpm -F @pumped-fn/lite-react test:browser:lightpanda

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and linting
        run: pnpm lint:check

  changeset:
    name: Changeset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changeset
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ "$PR_TITLE" == *"chore:"* ]] || \
             [[ "$PR_TITLE" == *"docs:"* ]] || \
             [[ "$PR_TITLE" == *"ci:"* ]] || \
             [[ "$PR_TITLE" == *"[skip-changeset]"* ]]; then
            echo "Skipping changeset check for this PR type"
            exit 0
          fi

          pnpm changeset status --since=origin/main

  changed-packages:
    name: Changed Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild changed packages
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before || 'origin/main' }}
        run: pnpm ci:changed-packages

name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm -F @pumped-fn/lite-react exec playwright install --with-deps chromium

      - name: Install Lightpanda browser
        run: |
          lightpanda_sha256=7c2ed74b65b002203de17ff0289b19616db77321f762e1c1e9a0cd4d47e64b81
          curl -fsSL -o /tmp/lightpanda https://github.com/lightpanda-io/browser/releases/download/nightly/lightpanda-x86_64-linux
          echo "${lightpanda_sha256}  /tmp/lightpanda" | sha256sum --check --status
          chmod +x /tmp/lightpanda
          echo "LIGHTPANDA_EXECUTABLE_PATH=/tmp/lightpanda" >> "$GITHUB_ENV"

      - name: Check Lightpanda browser
        run: ${LIGHTPANDA_EXECUTABLE_PATH:-$HOME/.cache/lightpanda-node/lightpanda} version

      - name: Build packages
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        timeout-minutes: 15
        run: pnpm -r --workspace-concurrency=2 test --passWithNoTests

      - name: Diagnose test failure
        if: failure()
        run: |
          nproc
          lscpu
          free -h
          ps -eo pid,ppid,stat,etime,%cpu,%mem,wchan:32,comm --sort=-%cpu

      - name: Run comparison browser smoke
        run: pnpm -F @pumped-fn/compare browser:smoke

      - name: Run Lightpanda browser tests
        run: pnpm -F @pumped-fn/lite-react test:browser:lightpanda

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting and linting
        run: pnpm lint:check

  changeset:
    name: Changeset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release policy
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          pnpm release-policy:test
          pnpm release-policy:check -- --base "$BASE_SHA"

      - name: Check for changeset
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          TITLE_SKIP_PATTERN='^(chore|docs|ci)(\([^)]+\))?!?:([[:space:]]|$)'
          if [[ "$PR_TITLE" =~ $TITLE_SKIP_PATTERN ]] || \
             [[ "$PR_TITLE" == *"[skip-changeset]"* ]]; then
            echo "Skipping changeset check for this PR type"
            exit 0
          fi

          pnpm changeset status --since="$BASE_SHA"

  contract:
    name: Public Contract
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Check public and inline execution contracts
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          CHECKOUT_HEAD="$(git rev-parse HEAD)"
          CHANGED_FILES="$RUNNER_TEMP/public-contract-changed-files.json"
          git diff --name-only "$BASE_SHA...$CHECKOUT_HEAD" |
            node -e 'let value = ""; process.stdin.setEncoding("utf8"); process.stdin.on("data", chunk => value += chunk); process.stdin.on("end", () => process.stdout.write(JSON.stringify(value.split(/\r?\n/u).filter(Boolean))))' > "$CHANGED_FILES"
          pnpm examples:test
          pnpm examples:check
          pnpm contract:test
          pnpm contract:check -- --base "$BASE_SHA" --changed-files "$CHANGED_FILES" --pr-json "$GITHUB_EVENT_PATH" --expect-head "$CHECKOUT_HEAD"
          pnpm inline-exec:test
          pnpm inline-exec:check -- --expect-head "$CHECKOUT_HEAD"

  changed-packages:
    name: Changed Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild changed packages
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: pnpm ci:changed-packages

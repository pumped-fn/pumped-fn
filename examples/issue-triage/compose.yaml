services:
  control:
    image: postgres:17
    environment:
      POSTGRES_DB: issue_triage
      POSTGRES_USER: triage
      POSTGRES_PASSWORD: triage
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triage -d issue_triage"]
      interval: 2s
      timeout: 2s
      retries: 20
  victoria:
    image: victoriametrics/victoria-metrics:v1.120.0
    command: ["-retentionPeriod=7d"]
    ports:
      - "8428:8428"
